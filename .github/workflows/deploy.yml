name: Deploy to Vercel

# Despliega a producción en cada push a main (CI: lint + tests antes de desplegar).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# IDs del proyecto Vercel (no son secretos). El único secret requerido es VERCEL_TOKEN.
env:
  VERCEL_ORG_ID: team_UlbHMBpiQUuvfU31w7SQyWhF
  VERCEL_PROJECT_ID: prj_bLAiDTxd1dqWJ9KGCBaU6Emoh68l

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
